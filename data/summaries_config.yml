# Configuration for creating summary plots across assays.

# define defaults shared across summaries
summary_default: &summary_default
  min_times_seen: 2  # only include mutations with times_seen >= this
  min_frac_models: 0.75  # only include mutations in >= this fraction of models (selections)
  alphabet: [A, C, D, E, F, G, H, I, K, L, M, N, P, Q, R, S, T, V, W, Y]  # amino acids to include
  init_floor_escape_at_zero: false  # initially floor site escape to be >= 0?
  init_site_escape_stat: sum  # initially show site escape as this statistic

cell_entry_default: &cell_entry_default
  stat: effect  # column to plot
  color_scheme: redblue
  max_at_least: 2
  fixed_min: -5
  init_min_value: null
  le_filters:
    effect_std: 1.6  # remove if std less than this

# Entry in different cells
entry_all_cells:
  <<: *summary_default
  antibody_escape: {}
  other_phenotypes:
    entry in 293T cells:
      <<: *cell_entry_default
      csv: results/func_effects/averages/293T_entry_func_effects.csv
    entry in tufted duck MHCII cells:
      <<: *cell_entry_default
      csv: results/func_effects/averages/293_noSA_tufted_duck_MHCII_entry_func_effects.csv
